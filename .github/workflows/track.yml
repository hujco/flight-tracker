name: track

on:
  schedule:
    - cron: '0 */3 * * *'   # každé 3 hodiny (UTC) — ceny sa menia ~raz denne, hodinovo bolo zbytočné
  workflow_dispatch:        # manuálne spustenie z GitHub UI / gh
    inputs:
      test_alert:
        description: 'Poslať testovací Telegram alert'
        type: boolean
        default: false
  push:
    branches: [main]       # pri každej zmene kódu → prebuduj report
    paths-ignore:
      - 'prices.db'        # commit dát botom (GITHUB_TOKEN) workflow ani tak nespúšťa

# scheduled workflows bežia len na default branch (main)
permissions:
  contents: write   # commit price history do main + publish report do gh-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fares + build report + maybe alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ALERT_TEST: ${{ inputs.test_alert }}
        run: python -m tracker.run

      - name: Prepare site
        run: |
          mkdir -p public
          cp report.html public/index.html

      # Plán B: publikovať report do vetvy gh-pages (legacy Pages build je spoľahlivý;
      # obchádza flaky "Deployment failed, try again later" z actions/deploy-pages).
      - name: Publish report to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

      - name: Commit price history
        run: |
          git config user.name "flight-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.db
          git diff --staged --quiet && exit 0
          git commit -m "data: hourly fares ($(date -u +%FT%TZ))"
          git push || (git pull --rebase --autostash && git push)
