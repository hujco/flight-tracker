name: track

on:
  schedule:
    - cron: '0 */3 * * *'   # každé 3 hodiny (UTC) — ceny sa menia ~raz denne, hodinovo bolo zbytočné
  workflow_dispatch:        # manuálne spustenie z GitHub UI / gh
    inputs:
      test_alert:
        description: 'Poslať testovací Telegram alert'
        type: boolean
        default: false
  push:
    branches: [main]       # pri každej zmene kódu → prebuduj report
    paths-ignore:
      - 'prices.db'        # commit dát botom (GITHUB_TOKEN) workflow ani tak nespúšťa

# scheduled workflows bežia len na default branch (main)
permissions:
  contents: write   # commit price history späť do repa
  pages: write      # publikovať report na Pages
  id-token: write   # OIDC pre deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fares + build report + maybe alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ALERT_TEST: ${{ inputs.test_alert }}
        run: python -m tracker.run

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp report.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Deploy MUSÍ ísť pred commitom dát (aby git push neposunul hlavu vetvy).
      # deploy-pages občas hodí transientné "Deployment failed, try again later"
      # (flaky Pages backend), preto pri zlyhaní jeden retry.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Commit price history
        run: |
          git config user.name "flight-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.db
          git diff --staged --quiet && exit 0
          git commit -m "data: hourly fares ($(date -u +%FT%TZ))"
          git push || (git pull --rebase --autostash && git push)
